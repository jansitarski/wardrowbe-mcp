# Default values for wardrowbe-mcp.
# Override with `--set` or a custom `-f values.yaml`.

replicaCount: 1

image:
  repository: ghcr.io/jansitarski/wardrowbe-mcp
  # Image tag. Defaults to the chart's appVersion when left empty.
  tag: ""
  pullPolicy: IfNotPresent

# Pull secrets for a private GHCR package, e.g. [{ name: ghcr-pull }].
imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

# Server configuration — rendered into the binary's CLI flags.
config:
  # http (Streamable HTTP) or stdio. A k8s deployment should use http.
  transport: http
  host: 0.0.0.0
  port: 8080
  # Backend base URL (no /api/v1). REQUIRED.
  wardrowbeUrl: ""
  # dev or oidc.
  auth: dev
  # Dev identity sent to /auth/sync (used when auth=dev). Must match the web
  # user's external_id so Claude shares that wardrobe.
  externalId: ""
  externalEmail: ""
  # Emits the RFC 9728 resource_metadata on a 401 (for a Cloudflare Access MCP
  # portal). Leave empty to disable.
  portalResourceUrl: ""
  # In-flight /mcp request cap and inbound /mcp body cap (MB). Empty => the
  # binary's own defaults (16 / 40).
  maxConcurrent: ""
  maxBodyMb: ""
  # Any additional raw flags, e.g. ["--oidc-issuer=https://..."].
  extraArgs: []

# Incoming bearer API key (required for the http transport).
apiKey:
  # Inline value — the chart creates a Secret holding it. Leave empty in
  # committed values; pass via --set apiKey.value=... or use existingSecret.
  value: ""
  # Reference an existing Secret instead (takes precedence over value).
  existingSecret: ""
  # Key within the Secret that holds the bearer key.
  key: mcp-api-key

# Extra environment variables (besides MCP_API_KEY, which is wired from the Secret).
env:
  MCP_LOG_LEVEL: INFO

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    memory: 128Mi
    cpu: 50m
  limits:
    memory: 384Mi
    cpu: 500m

# The distroless image runs as a non-root user; these lock the runtime down.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: false
  name: ""

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}

# Probes: readiness pings the backend via /readyz; liveness hits the static /.
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 30
