{{- if and (not .Values.apiKey.existingSecret) .Values.apiKey.value }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wardrowbe-mcp.secretName" . }}
  labels:
    {{- include "wardrowbe-mcp.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.apiKey.key }}: {{ .Values.apiKey.value | quote }}
{{- end }}
