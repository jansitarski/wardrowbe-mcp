{{- if ne (toString .Values.config.transport) "http" }}
{{- fail "config.transport must be \"http\": a Deployment attaches nothing to stdin, so a stdio server would hit EOF and crash-loop (and the HTTP probes would fail regardless)" }}
{{- end }}
{{- if and (not .Values.apiKey.value) (not .Values.apiKey.existingSecret) }}
{{- fail "config.transport=http requires an API key: set apiKey.value or apiKey.existingSecret" }}
{{- end }}
{{- if eq (toString .Values.config.auth) "oidc" }}
{{- if or (not .Values.oidc.issuerUrl) (not .Values.oidc.clientId) (not .Values.oidc.existingSecret) }}
{{- fail "config.auth=oidc requires oidc.issuerUrl, oidc.clientId and oidc.existingSecret (holding the client secret / refresh token)" }}
{{- end }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wardrowbe-mcp.fullname" . }}
  labels:
    {{- include "wardrowbe-mcp.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "wardrowbe-mcp.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wardrowbe-mcp.selectorLabels" . | nindent 8 }}
      {{- if or .Values.apiKey.value .Values.podAnnotations }}
      annotations:
        {{- if .Values.apiKey.value }}
        # Roll the Deployment when the chart-managed API key changes: rotating
        # apiKey.value only updates the Secret, and env from secretKeyRef is
        # resolved once at container start — without this, pods keep accepting
        # the OLD key. (apiKey.existingSecret rotation still needs a manual
        # `kubectl rollout restart`, or a tool like Reloader.)
        # The rendered Secret manifest is hashed, never the bare key: pod
        # annotations are readable with pod-only RBAC, and an unsalted digest
        # of the credential would be brute-forceable offline.
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "wardrowbe-mcp.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          args:
            # Each arg is quoted as a single token so a value containing a space
            # or newline can't split the rendered YAML array into extra entries.
            - {{ printf "--transport=%s" (toString .Values.config.transport) | quote }}
            - {{ printf "--host=%s" (toString .Values.config.host) | quote }}
            - {{ printf "--port=%v" .Values.config.port | quote }}
            - {{ printf "--wardrowbe-url=%s" (required "config.wardrowbeUrl is required (the Wardrowbe backend base URL)" .Values.config.wardrowbeUrl) | quote }}
            - {{ printf "--auth=%s" (toString .Values.config.auth) | quote }}
            {{- with .Values.config.externalId }}
            - {{ printf "--external-id=%s" (toString .) | quote }}
            {{- end }}
            {{- with .Values.config.externalEmail }}
            - {{ printf "--external-email=%s" (toString .) | quote }}
            {{- end }}
            {{- with .Values.oidc.issuerUrl }}
            - {{ printf "--oidc-issuer-url=%s" (toString .) | quote }}
            {{- end }}
            {{- with .Values.oidc.clientId }}
            - {{ printf "--oidc-client-id=%s" (toString .) | quote }}
            {{- end }}
            {{- with .Values.config.portalResourceUrl }}
            - {{ printf "--portal-resource-url=%s" (toString .) | quote }}
            {{- end }}
            {{- with .Values.config.maxConcurrent }}
            - {{ printf "--max-concurrent=%v" . | quote }}
            {{- end }}
            {{- with .Values.config.maxBodyMb }}
            - {{ printf "--max-body-mb=%v" . | quote }}
            {{- end }}
            {{- range .Values.config.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          env:
            - name: MCP_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "wardrowbe-mcp.secretName" . }}
                  key: {{ .Values.apiKey.key }}
                  # Required: a missing/typo'd Secret should fail pod creation
                  # with a clear event, not start a server that rejects all
                  # requests (or crash-loop opaquely on a missing key).
                  optional: false
            {{- with .Values.oidc.existingSecret }}
            # OIDC secret material via env (never pod args). The client secret
            # is optional (public clients have none); the refresh token is what
            # OIDC mode cannot run without, so its absence should fail pod
            # creation with a clear event instead of an opaque crash-loop.
            - name: MCP_OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ . }}
                  key: {{ $.Values.oidc.clientSecretKey }}
                  optional: true
            - name: MCP_OIDC_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ . }}
                  key: {{ $.Values.oidc.refreshTokenKey }}
                  optional: false
            {{- end }}
            {{- range $k, $v := .Values.env }}
            - name: {{ $k }}
              value: {{ $v | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
