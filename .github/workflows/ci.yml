name: CI

on:
  push:
    branches: [master]
  pull_request:

# Default to no permissions; each job opts in to exactly what it needs.
permissions: {}

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache: true

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test (race + coverage)
        run: go test -race -coverprofile=coverage.out ./...

      - name: Integration test (every tool, end-to-end)
        run: go test -tags integration -race ./internal/mcpserver/

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: govulncheck (known stdlib/dep vulnerabilities)
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          go-version-input: '1.25.11'

      # Run gosec from its pinned release binary under our own Go, not the
      # securego/gosec container action — that action bundles an older Go that
      # cannot load a module whose go.mod requires 1.25.11 (GOTOOLCHAIN=local).
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache: true

      - name: gosec (static security analysis)
        env:
          GOSEC_VERSION: 2.27.1
        run: |
          curl -sSfL "https://github.com/securego/gosec/releases/download/v${GOSEC_VERSION}/gosec_${GOSEC_VERSION}_linux_amd64.tar.gz" -o /tmp/gosec.tgz
          tar -C /tmp -xzf /tmp/gosec.tgz gosec
          /tmp/gosec ./...

  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Lint chart
        run: |
          helm lint charts/wardrowbe-mcp --strict \
            --set config.wardrowbeUrl=http://backend:8000 \
            --set apiKey.value=ci-test

      - name: Template chart (smoke)
        run: |
          helm template ci charts/wardrowbe-mcp \
            --set config.wardrowbeUrl=http://backend:8000 \
            --set apiKey.value=ci-test >/dev/null
