name: Release

# Tag a commit `vX.Y.Z` and push it to publish a release:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds a multi-arch image, pushes it (and the Helm chart) to GHCR, and
# cuts a GitHub Release.
on:
  push:
    tags:
      - 'v*'

# No workflow-level permissions; each job opts in to the minimum it needs.
permissions: {}

jobs:
  # Gate publishing on the same checks CI runs: a tag pushed on a broken or
  # unformatted commit must not ship.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache: true

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Integration test
        run: go test -tags integration -race ./internal/mcpserver/

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read    # checkout (required while the repo is private; harmless after)
      packages: write   # push the image and Helm chart to GHCR
      id-token: write   # sign the build-provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4

      - name: Package and push Helm chart
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          helm registry login ghcr.io -u "$GHCR_USER" --password-stdin <<<"$GHCR_TOKEN"
          helm package charts/wardrowbe-mcp --version "$VERSION" --app-version "$VERSION"
          helm push "wardrowbe-mcp-${VERSION}.tgz" "oci://ghcr.io/${OWNER}/charts"

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # sign the build-provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.11'
          cache: true

      - name: Build static linux binaries (amd64, arm64, armv7)
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          v="${REF_NAME#v}"
          ldflags="-s -w -X 'github.com/jansitarski/wardrowbe-mcp/internal/mcpserver.serverVersion=${v}'"
          mkdir -p dist
          build() { # <goarch> <name-suffix> <goarm>
            CGO_ENABLED=0 GOOS=linux GOARCH="$1" GOARM="${3:-}" \
              go build -trimpath -ldflags="$ldflags" \
              -o "dist/wardrowbe-mcp_${v}_linux_$2" ./cmd/wardrowbe-mcp
          }
          build amd64 amd64
          build arm64 arm64
          build arm   armv7 7
          ( cd dist && sha256sum * > SHA256SUMS.txt )
          ls -l dist

      # SHA256SUMS.txt lives in the same release it protects; the signed
      # provenance attestation gives an integrity statement that doesn't.
      - name: Attest binary build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: dist/*
