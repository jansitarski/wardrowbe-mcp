name: Release

# Tag a commit `vX.Y.Z` and push it to publish a release:
#   git tag v1.0.0 && git push origin v1.0.0
# This builds a multi-arch image, pushes it (and the Helm chart) to GHCR, and
# cuts a GitHub Release.
on:
  push:
    tags:
      - 'v*'

# No workflow-level permissions; each job opts in to the minimum it needs.
permissions: {}

jobs:
  # Gate publishing on the same checks CI runs: a tag pushed on a broken or
  # unformatted commit must not ship.
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.12'
          cache: true

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test (race)
        run: go test -race ./...

      - name: Integration test
        run: go test -tags integration -race ./internal/mcpserver/

  publish:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read    # checkout (required while the repo is private; harmless after)
      packages: write   # push the image and Helm chart to GHCR
      id-token: write   # sign the build-provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest image build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5

      - name: Package and push Helm chart
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OWNER: ${{ github.repository_owner }}
        run: |
          helm registry login ghcr.io -u "$GHCR_USER" --password-stdin <<<"$GHCR_TOKEN"
          helm package charts/wardrowbe-mcp --version "$VERSION" --app-version "$VERSION"
          helm push "wardrowbe-mcp-${VERSION}.tgz" "oci://ghcr.io/${OWNER}/charts"

  release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the GitHub Release
      id-token: write   # sign the build-provenance attestation
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25.12'
          cache: true

      - name: Build static linux binaries (amd64, arm64, armv7)
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          v="${REF_NAME#v}"
          ldflags="-s -w -X 'github.com/jansitarski/wardrowbe-mcp/internal/mcpserver.serverVersion=${v}'"
          mkdir -p dist
          build() { # <goarch> <name-suffix> <goarm>
            CGO_ENABLED=0 GOOS=linux GOARCH="$1" GOARM="${3:-}" \
              go build -trimpath -ldflags="$ldflags" \
              -o "dist/wardrowbe-mcp_${v}_linux_$2" ./cmd/wardrowbe-mcp
          }
          build amd64 amd64
          build arm64 arm64
          build arm   armv7 7
          ( cd dist && sha256sum * > SHA256SUMS.txt )
          ls -l dist

      # SHA256SUMS.txt lives in the same release it protects; the signed
      # provenance attestation gives an integrity statement that doesn't.
      - name: Attest binary build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: dist/*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          generate_release_notes: true
          files: dist/*
