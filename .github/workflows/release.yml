name: Release

# Tag a commit `vX.Y.Z` and push it to publish a release:
#   git tag v0.3.0 && git push origin v0.3.0
# This builds a multi-arch image, pushes it to GHCR, and cuts a GitHub Release.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # create the GitHub Release
  packages: write   # push the image to GHCR

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - uses: azure/setup-helm@v4

      - name: Package and push Helm chart
        run: |
          version="${{ steps.meta.outputs.version }}"
          helm registry login ghcr.io \
            -u "${{ github.actor }}" --password-stdin <<<"${{ secrets.GITHUB_TOKEN }}"
          helm package charts/wardrowbe-mcp --version "$version" --app-version "$version"
          helm push "wardrowbe-mcp-${version}.tgz" \
            "oci://ghcr.io/${{ github.repository_owner }}/charts"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
